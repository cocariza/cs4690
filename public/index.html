<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Campus Logs</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">

        <div class="col-md-5">
          <a href="/uvu/login.html" class="text-decoration-none">
            <div class="card h-100 tenant-card tenant-uvu shadow-sm">
              <div class="card-body text-center p-5">
                <h2 class="card-title">UVU</h2>
                <p class="card-text">Utah Valley University</p>
              </div>
            </div>
          </a>
        </div>
        <div class="col-md-5">
          <a href="/uofu/login.html" class="text-decoration-none">
            <div class="card h-100 tenant-card tenant-uofu shadow-sm">
              <div class="card-body text-center p-5">
                <h2 class="card-title">UofU</h2>
                <p class="card-text">University of Utah</p>
              </div>
            </div>
          </a>
        </div>
      </div>
