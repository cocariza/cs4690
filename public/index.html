<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Student Logs | UVU</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- UVU Favicon -->
    <link rel="icon" href="https://www.uvu.edu/favicon.ico" />

    <!-- Bootstrap CSS (CDN, fall back to local) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
      onerror="this.onerror=null;this.href='/css/vendor/bootstrap.min.css'"
    />
  </head>

  <body>

    <!-- ===== NAVBAR (UVU branding + dark/light toggle) ===== -->
    <nav class="navbar navbar-expand-lg bg-success" data-bs-theme="dark">
      <div class="container-fluid">
        <!-- UVU graphic (requirement: at least one UVU graphic) -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <img
            src="https://www.uvu.edu/_common/images/uvu-mono.svg"
            alt="Utah Valley University"
            height="36"
          />
          <span class="fw-bold fs-4">Student Logs</span>
        </a>

        <button
          id="themeToggle"
          class="btn btn-outline-light btn-sm ms-auto"
          aria-label="Toggle dark/light mode"
          title="Toggle dark/light mode"
          type="button"
        >
          <span id="themeIcon">☀️</span>
          <span id="themeLabel">Light</span>
        </button>
      </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="container my-4">
      <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">

          <form>
            <!-- Course Select -->
            <div class="mb-3">
              <label for="course" class="form-label fw-semibold">Select Course</label>
              <select
                class="form-select"
                aria-label="Select Course"
                id="course"
                name="course"
                data-cy="course_select"
              >
                <!-- Populated dynamically via jQuery GET -->
                <option selected value="">Choose Courses</option>
              </select>
            </div>

            <!-- UVU ID (hidden until a course is selected) -->
            <div id="uvuIdContainer" class="mb-3 d-none">
              <label for="uvuId" class="form-label fw-semibold">UVU ID</label>
              <input
                type="text"
                class="form-control"
                id="uvuId"
                name="uvuId"
                data-cy="uvuId_input"
                placeholder="10234567"
                maxlength="8"
                inputmode="numeric"
                autocomplete="off"
              />
              <div id="help" class="form-text text-warning"></div>
            </div>

            <!-- Logs heading + list -->
            <h5 id="uvuIdDisplay" class="mt-4 mb-2" data-cy="uvuIdDisplay">Student Logs</h5>
            <ul
              class="list-group mb-3"
              data-cy="logs"
              id="logsList"
            ></ul>

            <!-- New Log textarea -->
            <div class="mb-3">
              <label for="logText" class="form-label fw-semibold">New Log</label>
              <textarea
                class="form-control"
                id="logText"
                aria-label="add log textarea"
                data-cy="log_textarea"
                rows="3"
              ></textarea>
            </div>

            <button type="submit" class="btn btn-success" data-cy="add_log_btn" id="addBtn" disabled>
              Add Log
            </button>
          </form>

        </div>
      </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="bg-success text-white text-center py-3 mt-5" data-bs-theme="dark">
      <small>&copy; Utah Valley University &mdash; Student Logs Application</small>
    </footer>

    <!-- jQuery (CDN, fall back to local) -->
    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script>window.jQuery || document.write('<script src="/js/vendor/jquery.min.js"><\/script>')</script>

    <!-- Bootstrap JS bundle (CDN, fall back to local) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmMpNJXIEAgGQgVEJB2boYBmqJzs"
      crossorigin="anonymous"
      onerror="this.onerror=null;this.src='/js/vendor/bootstrap.bundle.min.js'"
    ></script>
    <script>typeof bootstrap !== 'undefined' || document.write('<script src="/js/vendor/bootstrap.bundle.min.js"><\/script>')</script>

    <!-- App (compiled from src/script.ts) -->
    <script src="/js/script.js"></script>
  </body>
</html>
