<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Student</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-tenant="uvu" class="bg-body-tertiary">
    <nav class="navbar tenant-nav navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <span class="fw-bold fs-4"><span data-tenant-name></span> Student</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <span class="text-white">Signed in as <strong id="whoami"></strong></span>
          <button id="logoutBtn" class="btn btn-sm btn-outline-light">Log Out</button>
        </div>
      </div>
    </nav>
    <main class="container py-4">
      <div class="row">
        <div class="col-lg-6">
          <div class="section-card">
            <h4 class="tenant-header">My Courses</h4>
            <ul class="list-group mb-3" id="myCourses"></ul>
          </div>
          <div class="section-card">
            <h4 class="tenant-header">Add Myself to a Course</h4>
            <form id="enrollForm" class="row g-2">
              <div class="col-md-9"><select class="form-select" id="enrollCourse"></select></div>
              <div class="col-md-3"><button class="btn btn-tenant w-100" type="submit">Enroll</button></div>
            </form>
            <div id="enrollMsg" class="small mt-2"></div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="section-card">
            <h4 class="tenant-header">My Logs</h4>
            <div class="mb-3">
              <label class="form-label fw-semibold">Course</label>
              <select class="form-select" id="logCourse"></select>
            </div>
            <ul class="list-group mb-3" id="logsList"></ul>
            <form id="addLogForm">
              <div class="mb-2">
                <label class="form-label fw-semibold">New Log</label>
                <textarea class="form-control" id="logText" rows="3" required></textarea>
              </div>
              <button class="btn btn-tenant" type="submit">Add Log</button>
            </form>
            <div id="addLogMsg" class="small mt-2"></div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/js/student.js"></script>
  </body>
</html>
