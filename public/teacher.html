<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Teacher</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-tenant="uvu" class="bg-body-tertiary">
    <nav class="navbar tenant-nav navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <span class="fw-bold fs-4"><span data-tenant-name></span> Teacher</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <span class="text-white">Signed in as <strong id="whoami"></strong></span>
          <button id="logoutBtn" class="btn btn-sm btn-outline-light">Log Out</button>
        </div>
      </div>
    </nav>
    <main class="container py-4">
      <div class="row">
        <div class="col-lg-6">
          <div class="section-card">
            <h4 class="tenant-header">My Courses</h4>
            <ul class="list-group mb-3" id="myCourses"></ul>
            <form id="createCourseForm" class="row g-2">
              <div class="col-md-4"><input class="form-control" id="courseId" placeholder="cs4690" required /></div>
              <div class="col-md-6"><input class="form-control" id="courseDisplay" placeholder="CS 4690 - Web Dev" required /></div>
              <div class="col-md-2"><button class="btn btn-tenant w-100" type="submit">Add</button></div>
            </form>
            <div id="createCourseMsg" class="small mt-2"></div>
          </div>
          <div class="section-card">
            <h4 class="tenant-header">Create Student or TA</h4>
            <form id="createUserForm" class="row g-2">
              <div class="col-md-4"><input class="form-control" id="newUsername" placeholder="Username" required /></div>
              <div class="col-md-4"><input type="password" class="form-control" id="newPassword" placeholder="Password" required /></div>
              <div class="col-md-2">
                <select class="form-select" id="newRole">
                  <option value="student">Student</option>
                  <option value="ta">TA</option>
                </select>
              </div>
              <div class="col-md-2"><button class="btn btn-tenant w-100" type="submit">Create</button></div>
            </form>
            <div id="createUserMsg" class="small mt-2"></div>
          </div>
          <div class="section-card">
            <h4 class="tenant-header">Enroll Student in Course</h4>
            <form id="enrollForm" class="row g-2">
              <div class="col-md-5"><select class="form-select" id="enrollCourse"></select></div>
              <div class="col-md-5"><select class="form-select" id="enrollStudent"></select></div>
              <div class="col-md-2"><button class="btn btn-tenant w-100" type="submit">Add</button></div>
            </form>
            <div id="enrollMsg" class="small mt-2"></div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="section-card">
            <h4 class="tenant-header">Logs For My Courses</h4>
            <div class="mb-3 row g-2">
              <div class="col-md-7"><select class="form-select" id="logCourseFilter"><option value="">All my courses</option></select></div>
              <div class="col-md-5"><button class="btn btn-outline-tenant w-100" id="refreshLogs">Refresh</button></div>
            </div>
            <ul class="list-group" id="logsList"></ul>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/js/teacher.js"></script>
  </body>
</html>
