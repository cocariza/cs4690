<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Admin</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-tenant="uvu" class="bg-body-tertiary">
    <nav class="navbar tenant-nav navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <span class="fw-bold fs-4"><span data-tenant-name></span> Admin</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <span class="text-white">Signed in as <strong id="whoami"></strong></span>
          <button id="logoutBtn" class="btn btn-sm btn-outline-light">Log Out</button>
        </div>
      </div>
    </nav>
    <main class="container py-4">
      <ul class="nav nav-tabs mb-3" id="adminTabs">
        <li class="nav-item"><a class="nav-link active" data-tab="users" href="#">Users</a></li>
        <li class="nav-item"><a class="nav-link" data-tab="courses" href="#">Courses</a></li>
        <li class="nav-item"><a class="nav-link" data-tab="logs" href="#">All Logs</a></li>
      </ul>

      <section id="tab-users">
        <div class="section-card">
          <h4 class="tenant-header">Create User</h4>
          <form id="createUserForm" class="row g-2">
            <div class="col-md-3"><input class="form-control" id="newUsername" placeholder="Username" required /></div>
            <div class="col-md-3"><input type="password" class="form-control" id="newPassword" placeholder="Password" required /></div>
            <div class="col-md-3">
              <select class="form-select" id="newRole">
                <option value="admin">Admin</option>
                <option value="teacher">Teacher</option>
                <option value="ta">TA</option>
                <option value="student" selected>Student</option>
              </select>
            </div>
            <div class="col-md-3"><button class="btn btn-tenant w-100" type="submit">Create</button></div>
          </form>
          <div id="createUserMsg" class="small mt-2"></div>
        </div>
        <div class="section-card">
          <h4 class="tenant-header">All Users</h4>
          <table class="table table-striped">
            <thead><tr><th>Username</th><th>Role</th></tr></thead>
            <tbody id="usersTable"></tbody>
          </table>
        </div>
      </section>

      <section id="tab-courses" hidden>
        <div class="section-card">
          <h4 class="tenant-header">Create Course</h4>
          <form id="createCourseForm" class="row g-2">
            <div class="col-md-3"><input class="form-control" id="courseId" placeholder="cs4690" required /></div>
            <div class="col-md-5"><input class="form-control" id="courseDisplay" placeholder="CS 4690 - Web Dev" required /></div>
            <div class="col-md-3"><select class="form-select" id="courseTeacher"><option value="">No teacher assigned</option></select></div>
            <div class="col-md-1"><button class="btn btn-tenant w-100" type="submit">Add</button></div>
          </form>
          <div id="createCourseMsg" class="small mt-2"></div>
        </div>
        <div class="section-card">
          <h4 class="tenant-header">All Courses</h4>
          <ul class="list-group" id="coursesList"></ul>
        </div>
      </section>

      <section id="tab-logs" hidden>
        <div class="section-card">
          <h4 class="tenant-header">All Student Logs</h4>
          <div class="mb-3 row g-2">
            <div class="col-md-4"><select class="form-select" id="logCourseFilter"><option value="">All courses</option></select></div>
            <div class="col-md-4"><input class="form-control" id="logUvuFilter" placeholder="Filter by UVU ID" /></div>
            <div class="col-md-2"><button class="btn btn-outline-tenant w-100" id="applyFilters">Apply</button></div>
          </div>
          <ul class="list-group" id="logsList"></ul>
        </div>
      </section>
    </main>
    <script type="module" src="/js/admin.js"></script>
  </body>
</html>
