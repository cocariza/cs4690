<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>Login</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-tenant="uvu" class="bg-body-tertiary">
    <nav class="navbar tenant-nav navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
          <img data-tenant-logo src="" alt="" height="32" />
          <span class="fw-bold fs-4"><span data-tenant-name></span> Logs</span>
        </a>
      </div>
    </nav>
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="section-card">
            <h2 class="tenant-header mb-4">Sign In</h2>
            <form id="loginForm">
              <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" id="username" name="username" autocomplete="username" required />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required />
              </div>
              <div id="loginError" class="text-danger mb-3" role="alert"></div>
              <button type="submit" class="btn btn-tenant w-100">Log In</button>
            </form>
            <hr />
            <p class="text-center mb-0">
              New student? <a href="signup.html" class="fw-semibold">Create an account</a>
            </p>
            <p class="text-center small text-muted mt-3 mb-0">
              <a href="/">Switch institution</a>
            </p>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>
